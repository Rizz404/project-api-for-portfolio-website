version: "2"
sql:
  - schema: "db/migrations"
    queries: "internal/repository/postgresql/sqlc/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/postgresql/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
    rules:
      - sqlc/db-prepare
