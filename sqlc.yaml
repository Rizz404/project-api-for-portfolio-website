version: "2"
sql:
  - schema: "db/migrations"
    queries: "internal/repository/postgresql/sqlc/queries"
    engine: "postgresql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/postgresql/sqlc"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          # UUID -> ULID untuk semua UUID field
          - db_type: "UUID"
            go_type:
              import: "github.com/oklog/ulid/v2"
              type: "ULID"

          # Timestamp default jadi time.Time
          - db_type: "timestamp"
            go_type:
              import: "time"
              type: "Time"

          # Timestamptz default jadi time.Time
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"

          # Boolean default jadi bool
          - db_type: "boolean"
            go_type: "bool"

          # Text default jadi string
          - db_type: "text"
            go_type: "string"

          # Varchar default jadi string
          - db_type: "varchar"
            go_type: "string"

    rules:
      - sqlc/db-prepare
